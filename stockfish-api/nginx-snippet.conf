# Add this to the http {} block (or top-level, outside server {}):
# limit_req_zone $binary_remote_addr zone=stockfish:10m rate=10r/m;

# Add this inside the server {} block in /etc/nginx/sites-available/game.altobolt.com:

location /api/stockfish {
    limit_req zone=stockfish burst=5 nodelay;
    limit_req_status 429;

    proxy_pass http://127.0.0.1:3848/analyze;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 20s;
    proxy_connect_timeout 5s;

    # CORS
    add_header Access-Control-Allow-Origin "https://game.altobolt.com" always;
    add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type" always;

    if ($request_method = OPTIONS) {
        return 204;
    }
}
